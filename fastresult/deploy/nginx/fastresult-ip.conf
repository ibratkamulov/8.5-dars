##############################################################
# FastResult — nginx reverse proxy (IP-only, no SSL)
# Frontend  → port 3000 (Next.js)
# API       → port 4000 (NestJS, /api prefix)
# Swagger   → port 4000 (/docs)
# Socket.IO → port 4000 (/socket.io/)
##############################################################

server {
    listen 80;
    listen [::]:80;
    server_name 13.140.160.169;

    access_log /var/log/nginx/fastresult.access.log combined;
    error_log  /var/log/nginx/fastresult.error.log warn;

    client_max_body_size 50m;

    # --- Compression ---
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/xml+rss
        image/svg+xml
        font/woff2;

    # --- Security headers ---
    add_header X-Frame-Options        "SAMEORIGIN"              always;
    add_header X-Content-Type-Options "nosniff"                 always;
    add_header X-XSS-Protection       "1; mode=block"           always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # --- Proxy shared settings (applied per-block below) ---
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
    proxy_connect_timeout 10s;
    proxy_send_timeout 60s;
    proxy_buffer_size  128k;
    proxy_buffers      4 256k;
    proxy_busy_buffers_size 256k;

    # -------------------------------------------------------
    # Socket.IO — must come before /api and /
    # engine.io handshake always goes through /socket.io/
    # Namespace (/events) is resolved at the protocol level
    # -------------------------------------------------------
    location /socket.io/ {
        proxy_pass         http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;    # keep WebSocket alive
        proxy_send_timeout 86400s;
        proxy_buffering    off;
        access_log /var/log/nginx/fastresult.ws.log combined;
    }

    # -------------------------------------------------------
    # NestJS REST API  (all /api/* routes)
    # Global prefix /api is preserved — NestJS expects it
    # -------------------------------------------------------
    location /api/ {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host             $host;
        proxy_set_header X-Real-IP        $remote_addr;
        proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # -------------------------------------------------------
    # Swagger UI  — SwaggerModule.setup("docs", app, ...)
    # Swagger also loads sub-assets: /docs/swagger-ui.css etc.
    # -------------------------------------------------------
    location /docs {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host             $host;
        proxy_set_header X-Real-IP        $remote_addr;
        proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # -------------------------------------------------------
    # Next.js immutable static assets — cache forever
    # File names contain content hashes, safe to cache 1 year
    # -------------------------------------------------------
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Next.js image optimisation endpoint
    location /_next/image {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host             $host;
        proxy_set_header X-Real-IP        $remote_addr;
        proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # PWA manifest + service worker — must not be cached
    location ~* \.(webmanifest|sw\.js)$ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        add_header Cache-Control "no-store, no-cache";
    }

    # -------------------------------------------------------
    # Next.js frontend — catch-all (must be last)
    # -------------------------------------------------------
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
